<!DOCTYPE html>
<html>
<head>
<title>ATS Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

/* BLUE ATS THEME */

:root{
--bg:#0b1120;
--sidebar:#0f172a;
--card:#1e293b;
--text:#e2e8f0;
--muted:#94a3b8;
--accent:#3b82f6;
}

body{
display:flex;
height:100vh;
background:var(--bg);
color:var(--text);
}

/* SIDEBAR */

.sidebar{
width:240px;
background:var(--sidebar);
color:white;
padding:30px 20px;
display:flex;
flex-direction:column;
}

.logo{
font-size:22px;
font-weight:600;
margin-bottom:40px;
color:#60a5fa;
}

.menu a{
display:block;
text-decoration:none;
color:#e5e7eb;
padding:12px;
border-radius:10px;
margin-bottom:10px;
transition:0.2s;
}

.menu a:hover{
background:#3b82f6;
}

/* MAIN */

.main{
flex:1;
padding:40px;
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.topbar h2{
color:#60a5fa;
}

.search{
padding:10px 15px;
border-radius:10px;
border:none;
background:var(--card);
color:white;
outline:none;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
padding:25px;
border-radius:16px;
background:var(--card);
color:var(--text);
box-shadow:0 10px 25px rgba(0,0,0,0.25);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card p{
color:var(--muted);
}

.card h3{
margin-top:8px;
font-size:28px;
color:var(--accent);
}

/* UPLOAD */

.upload{
background:linear-gradient(135deg,#2563eb,#3b82f6);
color:white;
padding:40px;
border-radius:18px;
text-align:center;
margin-bottom:30px;
}

.upload button{
margin-top:20px;
padding:12px 26px;
border:none;
border-radius:30px;
background:white;
color:#2563eb;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

.upload button:hover{
background:#e5e7eb;
}

/* SCORE */

.score{
padding:30px;
border-radius:18px;
background:var(--card);
color:var(--text);
}

.score-value{
font-size:50px;
font-weight:600;
color:#3b82f6;
margin:10px 0;
}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">ATS</div>

<div class="menu">
<a href="dashboard.html">Dashboard</a>
<a href="applicant.html">Applicants</a>
<a href="resumeanalyzer.html">Resume Analyzer</a>
<a href="interview.html">Interviews</a>
<a href="analytics.html">Analytics</a>
<a href="setting.html">Settings</a>
</div>

</div>


<div class="main">

<div class="topbar">

<h2>Dashboard</h2>

<input class="search" placeholder="Search candidates">

</div>


<div class="cards">

<div class="card">
<p>Total Applicants</p>
<h3>132</h3>
</div>

<div class="card">
<p>Interviews Scheduled</p>
<h3>24</h3>
</div>

<div class="card">
<p>Jobs Posted</p>
<h3>8</h3>
</div>

</div>


<div class="upload">

<h2>Upload Resume</h2>
<p>Drag & drop your resume to check ATS compatibility</p>

<button>Upload Resume</button>

</div>


<div class="score">

<h3>ATS Compatibility Score</h3>

<div class="score-value">86%</div>

<p>Your resume is optimized for most ATS systems.</p>

</div>

</div>

</body>
</html>
