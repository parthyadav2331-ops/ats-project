<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CareersFit — Settings</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
:root{--bg:#0b1120;--sidebar:#0f172a;--card:#1e293b;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6;}
body{display:flex;height:100vh;background:var(--bg);color:var(--text);}
.sidebar{width:240px;background:var(--sidebar);color:white;padding:30px 20px;display:flex;flex-direction:column;flex-shrink:0;}
.logo{font-size:20px;font-weight:700;margin-bottom:40px;color:#60a5fa;letter-spacing:-0.3px;}
.menu a{display:block;text-decoration:none;color:#e5e7eb;padding:11px 12px;border-radius:10px;margin-bottom:8px;transition:0.2s;font-size:14px;}
.menu a:hover{background:#3b82f6;color:white;}
.main{flex:1;padding:40px;overflow:auto;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;}
.topbar h2{color:#60a5fa;font-size:22px;}
.search{padding:10px 15px;border-radius:10px;border:none;background:var(--card);color:white;outline:none;font-size:14px;}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:30px;}
.card{padding:25px;border-radius:16px;background:var(--card);color:var(--text);box-shadow:0 4px 20px rgba(0,0,0,0.25);transition:0.3s;}
.card:hover{transform:translateY(-4px);}
.card p{color:var(--muted);font-size:13px;}
.card h3{margin-top:8px;font-size:28px;color:var(--accent);}
.section{background:var(--card);padding:25px;border-radius:16px;margin-bottom:22px;box-shadow:0 4px 20px rgba(0,0,0,0.25);}
.section h3{margin-bottom:18px;color:#60a5fa;font-size:15px;}
.form-group{display:flex;flex-direction:column;margin-bottom:14px;}
label{margin-bottom:5px;color:var(--muted);font-size:13px;}
input,select{padding:10px;border-radius:8px;border:none;background:#334155;color:white;outline:none;font-size:14px;}
.save-btn{padding:11px 22px;border:none;border-radius:10px;background:#3b82f6;color:white;cursor:pointer;font-weight:600;font-size:14px;transition:0.2s;}
.save-btn:hover{background:#2563eb;}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">CareersFit</div>
  <div class="menu">
    <a href="dashboard.html" class="nav-link">📊 Dashboard</a>
    <a href="applicant.html" class="nav-link">👥 Applicants</a>
    <a href="interview.html" class="nav-link">📅 Interviews</a>
    <a href="analytics.html" class="nav-link">📈 Analytics</a>
    <a href="post-job.html" class="nav-link">💼 Post a Job</a>
    <a href="setting.html" class="nav-link">⚙️ Settings</a>
  </div>
  <div style="margin-top:auto;padding-top:20px;">
    <a href="loginpage.html" style="display:block;text-decoration:none;color:#94a3b8;padding:12px;border-radius:10px;font-size:14px;" onmouseover="this.style.background='#ef4444';this.style.color='white'" onmouseout="this.style.background='';this.style.color='#94a3b8'">🚪 Logout</a>
  </div>
</div>
<script>
(function(){
  var links = document.querySelectorAll('.nav-link');
  var page = window.location.pathname.split('/').pop() || 'dashboard.html';
  links.forEach(function(a){
    if(a.getAttribute('href') === page){
      a.style.background='#3b82f6';
      a.style.color='white';
    }
  });
})();
</script>
<div class="main">
  <div class="topbar"><h2>Settings</h2></div>
  <div class="section">
    <h3>Company Information</h3>
    <div class="form-group"><label>Company Name</label><input type="text" placeholder="Enter company name"></div>
    <div class="form-group"><label>Company Website</label><input type="text" placeholder="https://company.com"></div>
    <div class="form-group"><label>Company Size</label>
      <select><option>1–10 Employees</option><option>10–50 Employees</option><option>50–200 Employees</option><option>200+ Employees</option></select>
    </div>
  </div>
  <div class="section">
    <h3>Hiring Preferences</h3>
    <div class="form-group"><label>Default Interview Duration</label>
      <select><option>30 Minutes</option><option>45 Minutes</option><option>1 Hour</option></select>
    </div>
    <div class="form-group"><label>Resume Format Accepted</label>
      <select><option>PDF</option><option>DOCX</option><option>PDF &amp; DOCX</option></select>
    </div>
    <div class="form-group"><label>Automatic Resume Screening</label>
      <select><option>Enabled</option><option>Disabled</option></select>
    </div>
  </div>
  <div class="section">
    <h3>Notification Settings</h3>
    <div class="form-group"><label>Email Notifications</label>
      <select><option>Enabled</option><option>Disabled</option></select>
    </div>
    <div class="form-group"><label>Interview Reminder Alerts</label>
      <select><option>Enabled</option><option>Disabled</option></select>
    </div>
  </div>
  <div class="section">
    <h3>Account &amp; Security</h3>
    <div class="form-group"><label>Email</label><input type="email" placeholder="Enter email"></div>
    <div class="form-group"><label>Change Password</label><input type="password" placeholder="Enter new password"></div>
  </div>
  <button class="save-btn" onclick="alert('Settings saved!')">Save All Settings</button>
</div>
</body>
</html>
