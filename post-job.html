<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CareersFit — Post a Job</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
:root{--bg:#0b1120;--sidebar:#0f172a;--card:#1e293b;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6;}
body{display:flex;height:100vh;background:var(--bg);color:var(--text);}
.sidebar{width:240px;background:var(--sidebar);color:white;padding:30px 20px;display:flex;flex-direction:column;flex-shrink:0;}
.logo{font-size:20px;font-weight:700;margin-bottom:40px;color:#60a5fa;letter-spacing:-0.3px;}
.menu a{display:block;text-decoration:none;color:#e5e7eb;padding:11px 12px;border-radius:10px;margin-bottom:8px;transition:0.2s;font-size:14px;}
.menu a:hover{background:#3b82f6;color:white;}
.main{flex:1;padding:40px;overflow:auto;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;}
.topbar h2{color:#60a5fa;font-size:22px;}
.search{padding:10px 15px;border-radius:10px;border:none;background:var(--card);color:white;outline:none;font-size:14px;}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:30px;}
.card{padding:25px;border-radius:16px;background:var(--card);color:var(--text);box-shadow:0 4px 20px rgba(0,0,0,0.25);transition:0.3s;}
.card:hover{transform:translateY(-4px);}
.card p{color:var(--muted);font-size:13px;}
.card h3{margin-top:8px;font-size:28px;color:var(--accent);}
.form-box{background:var(--card);padding:32px;border-radius:18px;max-width:700px;box-shadow:0 4px 20px rgba(0,0,0,0.25);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.form-group{display:flex;flex-direction:column;margin-bottom:4px;}
.form-group.full{grid-column:1/-1;}
label{margin-bottom:6px;color:var(--muted);font-size:13px;font-weight:500;}
input,select,textarea{padding:11px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:#334155;color:white;outline:none;font-size:14px;font-family:'Inter',sans-serif;}
textarea{resize:vertical;min-height:110px;}
input:focus,select:focus,textarea:focus{border-color:#3b82f6;}
.post-btn{margin-top:20px;padding:12px 28px;border:none;border-radius:12px;background:#3b82f6;color:white;font-weight:600;font-size:15px;cursor:pointer;transition:0.2s;}
.post-btn:hover{background:#2563eb;}
.tag-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
.tag{background:#1e3a5f;color:#93c5fd;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">CareersFit</div>
  <div class="menu">
    <a href="dashboard.html" class="nav-link">📊 Dashboard</a>
    <a href="applicant.html" class="nav-link">👥 Applicants</a>
    <a href="resumeanalyzer.html" class="nav-link">🔍 Resume Analyzer</a>
    <a href="interview.html" class="nav-link">📅 Interviews</a>
    <a href="analytics.html" class="nav-link">📈 Analytics</a>
    <a href="post-job.html" class="nav-link">💼 Post a Job</a>
    <a href="setting.html" class="nav-link">⚙️ Settings</a>
  </div>
  <div style="margin-top:auto;padding-top:20px;">
    <a href="loginpage.html" style="display:block;text-decoration:none;color:#94a3b8;padding:12px;border-radius:10px;font-size:14px;" onmouseover="this.style.background='#ef4444';this.style.color='white'" onmouseout="this.style.background='';this.style.color='#94a3b8'">🚪 Logout</a>
  </div>
</div>
<script>
(function(){
  var links = document.querySelectorAll('.nav-link');
  var page = window.location.pathname.split('/').pop() || 'dashboard.html';
  links.forEach(function(a){
    if(a.getAttribute('href') === page){
      a.style.background='#3b82f6';
      a.style.color='white';
    }
  });
})();
</script>
<div class="main">
  <div class="topbar"><h2>Post a Job</h2></div>
  <div class="form-box">
    <div class="form-grid">
      <div class="form-group">
        <label>Job Title</label>
        <input type="text" placeholder="e.g. Frontend Developer">
      </div>
      <div class="form-group">
        <label>Department</label>
        <input type="text" placeholder="e.g. Engineering">
      </div>
      <div class="form-group">
        <label>Location</label>
        <input type="text" placeholder="e.g. Remote / Mumbai">
      </div>
      <div class="form-group">
        <label>Employment Type</label>
        <select><option>Full-time</option><option>Part-time</option><option>Contract</option><option>Internship</option></select>
      </div>
      <div class="form-group">
        <label>Experience Required</label>
        <select><option>Fresher / 0-1 yr</option><option>1-3 years</option><option>3-5 years</option><option>5+ years</option></select>
      </div>
      <div class="form-group">
        <label>Salary Range</label>
        <input type="text" placeholder="e.g. ₹8–12 LPA">
      </div>
      <div class="form-group full">
        <label>Job Description</label>
        <textarea placeholder="Describe the role, responsibilities, and expectations..."></textarea>
      </div>
      <div class="form-group full">
        <label>Required Skills</label>
        <input type="text" placeholder="e.g. React, Node.js, SQL (comma separated)">
        <div class="tag-row">
          <span class="tag">React</span>
          <span class="tag">Node.js</span>
          <span class="tag">SQL</span>
          <span class="tag">REST APIs</span>
        </div>
      </div>
      <div class="form-group">
        <label>Application Deadline</label>
        <input type="date">
      </div>
      <div class="form-group">
        <label>ATS Minimum Score</label>
        <select><option>Any</option><option>60%+</option><option>70%+</option><option>80%+</option><option>90%+</option></select>
      </div>
    </div>
    <button class="post-btn" onclick="alert('Job posted successfully!')">Post Job</button>
  </div>
</div>
</body>
</html>
