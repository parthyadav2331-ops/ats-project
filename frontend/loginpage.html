<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CareersFit — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#e0ecff,#dbeafe,#eff6ff);color:#1e293b;}
.container{background:white;padding:40px 32px;border-radius:20px;width:100%;max-width:440px;box-shadow:0 12px 40px rgba(0,0,0,0.12);}
.brand{text-align:center;margin-bottom:28px;}
.brand-name{font-size:26px;font-weight:700;color:#2563eb;letter-spacing:-0.5px;}
.brand-sub{font-size:13px;color:#64748b;margin-top:4px;}
.role-tabs{display:flex;background:#f1f5f9;border-radius:12px;padding:4px;margin-bottom:28px;}
.role-tab{flex:1;padding:10px;text-align:center;border-radius:9px;font-size:14px;font-weight:500;cursor:pointer;transition:0.2s;color:#64748b;user-select:none;}
.role-tab.active{background:white;color:#2563eb;box-shadow:0 2px 8px rgba(0,0,0,0.1);font-weight:600;}
.role-tab.recruiter.active{color:#7c3aed;}
.role-badge{display:inline-block;font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;margin-bottom:18px;}
.role-badge.user-badge{background:#dbeafe;color:#1d4ed8;}
.role-badge.recruiter-badge{background:#ede9fe;color:#6d28d9;}
h2{text-align:center;margin-bottom:6px;font-size:20px;color:#0f172a;}
.form-subtitle{text-align:center;font-size:13px;color:#64748b;margin-bottom:22px;}
.form-group{margin-bottom:16px;position:relative;}
label{display:block;margin-bottom:6px;font-size:13px;font-weight:500;color:#374151;}
input{width:100%;padding:11px 40px 11px 12px;border-radius:10px;border:1.5px solid #e2e8f0;background:#f8fafc;outline:none;font-size:14px;transition:border-color 0.2s;}
input:focus{border-color:#3b82f6;}
.eye-icon{position:absolute;right:12px;top:36px;cursor:pointer;font-size:16px;}
.btn{width:100%;padding:12px;border:none;border-radius:12px;font-weight:600;font-size:15px;cursor:pointer;transition:0.2s;margin-top:4px;}
.btn-user{background:#2563eb;color:white;}
.btn-user:hover{background:#1d4ed8;}
.btn-recruiter{background:#7c3aed;color:white;}
.btn-recruiter:hover{background:#6d28d9;}
.btn[disabled]{opacity:0.7;cursor:not-allowed;}
.error{color:#dc2626;font-size:13px;text-align:center;margin-top:10px;min-height:18px;}
.switch{text-align:center;margin-top:16px;font-size:13px;color:#64748b;}
.switch a{cursor:pointer;font-weight:600;text-decoration:none;}
.switch a.user-link{color:#2563eb;}
.switch a.recruiter-link{color:#7c3aed;}
.hidden{display:none;}
@media(prefers-color-scheme:dark){
  body{background:linear-gradient(135deg,#020617,#0f172a,#1e1b4b);}
  .container{background:#0f172a;box-shadow:0 12px 40px rgba(0,0,0,0.5);}
  h2{color:#e2e8f0;}
  .brand-name{color:#60a5fa;}
  .brand-sub,.form-subtitle,.switch{color:#94a3b8;}
  label{color:#cbd5e1;}
  input{background:#1e293b;border-color:#334155;color:#e2e8f0;}
  input:focus{border-color:#3b82f6;}
  .role-tabs{background:#1e293b;}
  .role-tab{color:#94a3b8;}
  .role-tab.active{background:#0f172a;box-shadow:0 2px 8px rgba(0,0,0,0.4);}
  .role-badge.user-badge{background:#1e3a5f;color:#93c5fd;}
  .role-badge.recruiter-badge{background:#2e1065;color:#c4b5fd;}
}
</style>
</head>
<body>
<div class="container">
  <div class="brand">
    <div class="brand-name">CareersFit</div>
    <div class="brand-sub">AI-Powered Hiring Platform</div>
  </div>
  <div class="role-tabs">
    <div class="role-tab active" id="tab-user" onclick="switchRole('user')">Job Seeker</div>
    <div class="role-tab recruiter" id="tab-recruiter" onclick="switchRole('recruiter')">Recruiter</div>
  </div>

  <div id="loginForm">
    <div style="text-align:center;margin-bottom:18px;">
      <span class="role-badge user-badge" id="loginBadge">Signing in as Job Seeker</span>
    </div>
    <h2 id="loginTitle">Welcome Back</h2>
    <p class="form-subtitle" id="loginSubtitle">Sign in to your job seeker account</p>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="Enter your email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Enter your password">
      <span class="eye-icon" onclick="togglePassword('loginPassword')">👁</span>
    </div>
    <button class="btn btn-user" id="loginBtn" onclick="handleLogin()">Sign In</button>
    <div class="error" id="loginError"></div>
    <div class="switch">
      Don't have an account?
      <a class="user-link" id="switchToSignup" onclick="showSignup()">Create Account</a>
    </div>
  </div>

  <div id="signupForm" class="hidden">
    <div style="text-align:center;margin-bottom:18px;">
      <span class="role-badge user-badge" id="signupBadge">Creating Job Seeker Account</span>
    </div>
    <h2 id="signupTitle">Create Account</h2>
    <p class="form-subtitle" id="signupSubtitle">Join CareersFit as a job seeker</p>
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="signupName" placeholder="Enter your full name">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="signupEmail" placeholder="Enter your email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signupPassword" placeholder="Create a password">
      <span class="eye-icon" onclick="togglePassword('signupPassword')">👁</span>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Confirm your password">
      <span class="eye-icon" onclick="togglePassword('confirmPassword')">👁</span>
    </div>
    <button class="btn btn-user" id="signupBtn" onclick="handleSignup()">Create Account</button>
    <div class="error" id="signupError"></div>
    <div class="switch">
      Already have an account?
      <a class="user-link" id="switchToLogin" onclick="showLogin()">Sign In</a>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
let currentRole = 'user';

function switchRole(role){
  currentRole = role;
  const isR = role === 'recruiter';
  document.getElementById('tab-user').classList.toggle('active', !isR);
  document.getElementById('tab-recruiter').classList.toggle('active', isR);
  const lb = document.getElementById('loginBadge');
  const sb = document.getElementById('signupBadge');
  const lBtn = document.getElementById('loginBtn');
  const sBtn = document.getElementById('signupBtn');
  const links = document.querySelectorAll('.switch a');
  if(isR){
    lb.textContent = 'Signing in as Recruiter'; lb.className = 'role-badge recruiter-badge';
    sb.textContent = 'Creating Recruiter Account'; sb.className = 'role-badge recruiter-badge';
    document.getElementById('loginTitle').textContent = 'Recruiter Login';
    document.getElementById('loginSubtitle').textContent = 'Sign in to your recruiter dashboard';
    document.getElementById('signupTitle').textContent = 'Create Recruiter Account';
    document.getElementById('signupSubtitle').textContent = 'Start hiring with CareersFit';
    lBtn.className = 'btn btn-recruiter'; sBtn.className = 'btn btn-recruiter';
    links.forEach(a => a.className = 'recruiter-link');
  } else {
    lb.textContent = 'Signing in as Job Seeker'; lb.className = 'role-badge user-badge';
    sb.textContent = 'Creating Job Seeker Account'; sb.className = 'role-badge user-badge';
    document.getElementById('loginTitle').textContent = 'Welcome Back';
    document.getElementById('loginSubtitle').textContent = 'Sign in to your job seeker account';
    document.getElementById('signupTitle').textContent = 'Create Account';
    document.getElementById('signupSubtitle').textContent = 'Join CareersFit as a job seeker';
    lBtn.className = 'btn btn-user'; sBtn.className = 'btn btn-user';
    links.forEach(a => a.className = 'user-link');
  }
}

function setLoading(btnId, loading){
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.textContent = loading ? 'Please wait…' : (btnId === 'loginBtn' ? 'Sign In' : 'Create Account');
}

async function handleLogin(){
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  if(!email || !password){ errEl.textContent = 'Please enter email and password.'; return; }

  setLoading('loginBtn', true);
  try{
    const data = await api('/api/auth/login', {
      method: 'POST',
      body: JSON.stringify({ email, password })
    });
    if(data.user && data.user.role !== currentRole){
      errEl.textContent = `This account is registered as a ${data.user.role}. Switch tabs to continue.`;
      return;
    }
    localStorage.setItem('token', data.token);
    localStorage.setItem('role', (data.user && data.user.role) || currentRole);
    window.location.href = (data.user && data.user.role === 'recruiter') ? 'dashboard.html' : 'how-it-works.html';
  } catch(err){
    errEl.textContent = err.message || 'Login failed';
  } finally {
    setLoading('loginBtn', false);
  }
}

async function handleSignup(){
  const name = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  const confirm = document.getElementById('confirmPassword').value;
  const errEl = document.getElementById('signupError');
  errEl.textContent = '';
  if(!name || !email || !password){ errEl.textContent = 'All fields are required.'; return; }
  if(password !== confirm){ errEl.textContent = 'Passwords do not match.'; return; }

  setLoading('signupBtn', true);
  try{
    await api('/api/auth/register', {
      method: 'POST',
      body: JSON.stringify({ name, email, password, role: currentRole })
    });
    showLogin();
    document.getElementById('loginEmail').value = email;
    document.getElementById('loginError').textContent = 'Account created. Please sign in.';
  } catch(err){
    errEl.textContent = err.message || 'Signup failed';
  } finally {
    setLoading('signupBtn', false);
  }
}

function togglePassword(id){
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
}
function showSignup(){
  document.getElementById('loginForm').classList.add('hidden');
  document.getElementById('signupForm').classList.remove('hidden');
}
function showLogin(){
  document.getElementById('signupForm').classList.add('hidden');
  document.getElementById('loginForm').classList.remove('hidden');
}
</script>
</body>
</html>
