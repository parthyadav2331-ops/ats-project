<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CareersFit — Settings</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
:root{--bg:#0b1120;--sidebar:#0f172a;--card:#1e293b;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6;}
body{display:flex;height:100vh;background:var(--bg);color:var(--text);}
.sidebar{width:240px;background:var(--sidebar);color:white;padding:30px 20px;display:flex;flex-direction:column;flex-shrink:0;}
.logo{font-size:20px;font-weight:700;margin-bottom:40px;color:#60a5fa;}
.menu a{display:block;text-decoration:none;color:#e5e7eb;padding:11px 12px;border-radius:10px;margin-bottom:8px;transition:0.2s;font-size:14px;}
.menu a:hover{background:#3b82f6;color:white;}
.main{flex:1;padding:40px;overflow:auto;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;}
.topbar h2{color:#60a5fa;font-size:22px;}
.section{background:var(--card);padding:25px;border-radius:16px;margin-bottom:22px;box-shadow:0 4px 20px rgba(0,0,0,0.25);}
.section h3{margin-bottom:18px;color:#60a5fa;font-size:15px;}
.form-group{display:flex;flex-direction:column;margin-bottom:14px;}
label{margin-bottom:5px;color:var(--muted);font-size:13px;}
input,select{padding:10px;border-radius:8px;border:none;background:#334155;color:white;outline:none;font-size:14px;}
.save-btn{padding:11px 22px;border:none;border-radius:10px;background:#3b82f6;color:white;cursor:pointer;font-weight:600;font-size:14px;transition:0.2s;}
.save-btn:hover{background:#2563eb;}
.msg{margin-left:14px;font-size:13px;}
.msg.ok{color:#22c55e;} .msg.err{color:#ef4444;}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">CareersFit</div>
  <div class="menu">
    <a href="dashboard.html" class="nav-link">📊 Dashboard</a>
    <a href="applicant.html" class="nav-link">👥 Applicants</a>
    <a href="interview.html" class="nav-link">📅 Interviews</a>
    <a href="analytics.html" class="nav-link">📈 Analytics</a>
    <a href="post-job.html" class="nav-link">💼 Post a Job</a>
    <a href="setting.html" class="nav-link">⚙️ Settings</a>
  </div>
  <div style="margin-top:auto;padding-top:20px;">
    <a href="#" onclick="logout();return false;" style="display:block;text-decoration:none;color:#94a3b8;padding:12px;border-radius:10px;font-size:14px;">🚪 Logout</a>
  </div>
</div>

<div class="main">
  <div class="topbar"><h2>Settings</h2></div>

  <div class="section">
    <h3>Company Information</h3>
    <div class="form-group"><label>Company Name</label><input type="text" id="company_name"></div>
    <div class="form-group"><label>Company Website</label><input type="text" id="company_website" placeholder="https://company.com"></div>
    <div class="form-group"><label>Company Size</label>
      <select id="company_size">
        <option value="">Select…</option>
        <option>1–10 Employees</option><option>10–50 Employees</option><option>50–200 Employees</option><option>200+ Employees</option>
      </select>
    </div>
  </div>

  <div class="section">
    <h3>Hiring Preferences</h3>
    <div class="form-group"><label>Default Interview Duration</label>
      <select id="default_interview_duration"><option>30 Minutes</option><option>45 Minutes</option><option>1 Hour</option></select>
    </div>
    <div class="form-group"><label>Resume Format Accepted</label>
      <select id="resume_format"><option>PDF</option><option>DOCX</option><option>PDF & DOCX</option></select>
    </div>
    <div class="form-group"><label>Automatic Resume Screening</label>
      <select id="auto_screening"><option value="true">Enabled</option><option value="false">Disabled</option></select>
    </div>
  </div>

  <div class="section">
    <h3>Notification Settings</h3>
    <div class="form-group"><label>Email Notifications</label>
      <select id="email_notifications"><option value="true">Enabled</option><option value="false">Disabled</option></select>
    </div>
    <div class="form-group"><label>Interview Reminder Alerts</label>
      <select id="interview_reminders"><option value="true">Enabled</option><option value="false">Disabled</option></select>
    </div>
  </div>

  <div class="section">
    <h3>Account &amp; Security</h3>
    <div class="form-group"><label>Email</label><input type="email" id="email"></div>
    <div class="form-group"><label>Change Password</label><input type="password" id="password" placeholder="Leave blank to keep current"></div>
  </div>

  <div style="display:flex;align-items:center;">
    <button class="save-btn" onclick="save()">Save All Settings</button>
    <div class="msg" id="msg"></div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
if(!requireAuth()) { /* redirected */ }
highlightNav();

const setBool = (id, v) => { document.getElementById(id).value = v ? 'true' : 'false'; };
const getBool = (id) => document.getElementById(id).value === 'true';

async function load(){
  try {
    const [s, me] = await Promise.all([
      api('/api/settings'),
      api('/api/auth/me')
    ]);
    const v = s.settings || {};
    document.getElementById('company_name').value = v.company_name || '';
    document.getElementById('company_website').value = v.company_website || '';
    document.getElementById('company_size').value = v.company_size || '';
    if(v.default_interview_duration) document.getElementById('default_interview_duration').value = v.default_interview_duration;
    if(v.resume_format) document.getElementById('resume_format').value = v.resume_format;
    setBool('auto_screening', v.auto_screening !== false);
    setBool('email_notifications', v.email_notifications !== false);
    setBool('interview_reminders', v.interview_reminders !== false);
    document.getElementById('email').value = (me.user && me.user.email) || '';
  } catch(err){
    document.getElementById('msg').textContent = err.message;
    document.getElementById('msg').className = 'msg err';
  }
}

async function save(){
  const msg = document.getElementById('msg');
  msg.textContent = 'Saving…'; msg.className = 'msg';
  try {
    const payload = {
      company_name: document.getElementById('company_name').value.trim(),
      company_website: document.getElementById('company_website').value.trim(),
      company_size: document.getElementById('company_size').value,
      default_interview_duration: document.getElementById('default_interview_duration').value,
      resume_format: document.getElementById('resume_format').value,
      auto_screening: getBool('auto_screening'),
      email_notifications: getBool('email_notifications'),
      interview_reminders: getBool('interview_reminders'),
      email: document.getElementById('email').value.trim()
    };
    const pwd = document.getElementById('password').value;
    if(pwd) payload.password = pwd;

    await api('/api/settings', { method: 'PUT', body: JSON.stringify(payload) });
    msg.textContent = 'Saved ✅'; msg.className = 'msg ok';
    document.getElementById('password').value = '';
  } catch(err){
    msg.textContent = err.message; msg.className = 'msg err';
  }
}

load();
</script>
</body>
</html>
