<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CareersFit — Post a Job</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
:root{--bg:#0b1120;--sidebar:#0f172a;--card:#1e293b;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6;}
body{display:flex;height:100vh;background:var(--bg);color:var(--text);}
.sidebar{width:240px;background:var(--sidebar);color:white;padding:30px 20px;display:flex;flex-direction:column;flex-shrink:0;}
.logo{font-size:20px;font-weight:700;margin-bottom:40px;color:#60a5fa;letter-spacing:-0.3px;}
.menu a{display:block;text-decoration:none;color:#e5e7eb;padding:11px 12px;border-radius:10px;margin-bottom:8px;transition:0.2s;font-size:14px;}
.menu a:hover{background:#3b82f6;color:white;}
.main{flex:1;padding:40px;overflow:auto;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;}
.topbar h2{color:#60a5fa;font-size:22px;}
.form-box{background:var(--card);padding:32px;border-radius:18px;max-width:760px;box-shadow:0 4px 20px rgba(0,0,0,0.25);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.form-group{display:flex;flex-direction:column;margin-bottom:4px;}
.form-group.full{grid-column:1/-1;}
label{margin-bottom:6px;color:var(--muted);font-size:13px;font-weight:500;}
input,select,textarea{padding:11px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:#334155;color:white;outline:none;font-size:14px;font-family:'Inter',sans-serif;}
textarea{resize:vertical;min-height:110px;}
input:focus,select:focus,textarea:focus{border-color:#3b82f6;}
.post-btn{margin-top:20px;padding:12px 28px;border:none;border-radius:12px;background:#3b82f6;color:white;font-weight:600;font-size:15px;cursor:pointer;transition:0.2s;}
.post-btn:hover{background:#2563eb;}
.post-btn[disabled]{opacity:0.6;cursor:not-allowed;}
.msg{margin-top:14px;font-size:13px;}
.msg.ok{color:#22c55e;}
.msg.err{color:#ef4444;}
.posted-list{margin-top:30px;background:var(--card);padding:24px;border-radius:18px;}
.posted-list h3{color:#60a5fa;margin-bottom:14px;font-size:15px;}
.posted-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.06);}
.posted-row:last-child{border-bottom:0;}
.posted-row .meta{color:var(--muted);font-size:12px;}
.del-btn{background:#ef4444;color:white;border:none;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px;}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">CareersFit</div>
  <div class="menu">
    <a href="dashboard.html" class="nav-link">📊 Dashboard</a>
    <a href="applicant.html" class="nav-link">👥 Applicants</a>
    <a href="interview.html" class="nav-link">📅 Interviews</a>
    <a href="analytics.html" class="nav-link">📈 Analytics</a>
    <a href="post-job.html" class="nav-link">💼 Post a Job</a>
    <a href="setting.html" class="nav-link">⚙️ Settings</a>
  </div>
  <div style="margin-top:auto;padding-top:20px;">
    <a href="#" onclick="logout();return false;" style="display:block;text-decoration:none;color:#94a3b8;padding:12px;border-radius:10px;font-size:14px;">🚪 Logout</a>
  </div>
</div>

<div class="main">
  <div class="topbar"><h2>Post a Job</h2></div>
  <div class="form-box">
    <form id="jobForm">
      <div class="form-grid">
        <div class="form-group"><label>Job Title *</label><input type="text" id="title" placeholder="e.g. Frontend Developer" required></div>
        <div class="form-group"><label>Company</label><input type="text" id="company" placeholder="e.g. CareersFit"></div>
        <div class="form-group"><label>Department</label><input type="text" id="department" placeholder="e.g. Engineering"></div>
        <div class="form-group"><label>Location</label><input type="text" id="location" placeholder="e.g. Remote / Mumbai"></div>
        <div class="form-group"><label>Employment Type</label>
          <select id="type"><option>Full-time</option><option>Part-time</option><option>Contract</option><option>Internship</option></select>
        </div>
        <div class="form-group"><label>Experience Required</label>
          <select id="experience"><option>Fresher</option><option>1-3 years</option><option>3-5 years</option><option>5+ years</option></select>
        </div>
        <div class="form-group"><label>Salary Range</label><input type="text" id="salary" placeholder="e.g. ₹8–12 LPA"></div>
        <div class="form-group"><label>Application Deadline</label><input type="date" id="deadline"></div>
        <div class="form-group full"><label>Job Description</label>
          <textarea id="description" placeholder="Describe the role, responsibilities, and expectations..."></textarea>
        </div>
        <div class="form-group full"><label>Required Skills (comma separated)</label>
          <input type="text" id="skills" placeholder="e.g. React, Node.js, SQL">
        </div>
        <div class="form-group"><label>ATS Minimum Score</label>
          <select id="min_score"><option value="0">Any</option><option value="60">60%+</option><option value="70">70%+</option><option value="80">80%+</option><option value="90">90%+</option></select>
        </div>
      </div>
      <button class="post-btn" type="submit" id="postBtn">Post Job</button>
      <div class="msg" id="msg"></div>
    </form>
  </div>

  <div class="posted-list">
    <h3>My Posted Jobs</h3>
    <div id="postedJobs">Loading…</div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
if(!requireAuth(['recruiter'])) { /* redirected */ }
highlightNav();

const msg = document.getElementById('msg');

document.getElementById('jobForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  msg.textContent = '';

  const payload = {
    title: document.getElementById('title').value.trim(),
    company: document.getElementById('company').value.trim(),
    department: document.getElementById('department').value.trim(),
    location: document.getElementById('location').value.trim(),
    type: document.getElementById('type').value,
    experience: document.getElementById('experience').value,
    salary: document.getElementById('salary').value.trim(),
    description: document.getElementById('description').value.trim(),
    skills: document.getElementById('skills').value,
    deadline: document.getElementById('deadline').value || null,
    min_score: Number(document.getElementById('min_score').value) || 0
  };

  if(!payload.title){ msg.textContent = 'Title required'; msg.className = 'msg err'; return; }

  const btn = document.getElementById('postBtn');
  btn.disabled = true; btn.textContent = 'Posting…';

  try {
    await api('/api/jobs', { method: 'POST', body: JSON.stringify(payload) });
    msg.textContent = 'Job posted successfully ✅';
    msg.className = 'msg ok';
    document.getElementById('jobForm').reset();
    loadMyJobs();
  } catch(err){
    msg.textContent = 'Failed: ' + err.message;
    msg.className = 'msg err';
  } finally {
    btn.disabled = false; btn.textContent = 'Post Job';
  }
});

async function loadMyJobs(){
  const box = document.getElementById('postedJobs');
  try {
    const data = await api('/api/jobs/mine');
    if(!data.jobs.length){
      box.innerHTML = '<div style="color:#94a3b8;font-size:13px;">You haven\'t posted any jobs yet.</div>';
      return;
    }
    box.innerHTML = data.jobs.map(j => `
      <div class="posted-row">
        <div>
          <div style="font-weight:600;color:#e2e8f0;">${j.title}</div>
          <div class="meta">${j.location || '—'} · ${j.type || '—'} · ${j.application_count} applicants</div>
        </div>
        <button class="del-btn" onclick="deleteJob(${j.id})">Delete</button>
      </div>
    `).join('');
  } catch(err){
    box.innerHTML = `<div style="color:#ef4444;">${err.message}</div>`;
  }
}

async function deleteJob(id){
  if(!confirm('Delete this job?')) return;
  try {
    await api('/api/jobs/' + id, { method: 'DELETE' });
    loadMyJobs();
  } catch(err){
    alert('Failed: ' + err.message);
  }
}

loadMyJobs();
</script>
</body>
</html>
