<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ResumeIQ | AI Resume ATS Scanner</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
background: radial-gradient(circle at top left,#0f172a,#020617 70%);
color:#f1f5f9;
}

/* NAVBAR */
.navbar{
padding:22px 80px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(15,23,42,0.8);
backdrop-filter:blur(14px);
border-bottom:1px solid rgba(255,255,255,0.05);
}

.logo{
font-size:26px;
font-weight:800;
background:linear-gradient(90deg,#3b82f6,#22d3ee);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.nav-links a{
margin:0 20px;
text-decoration:none;
color:#94a3b8;
}

.login-btn{
border:1px solid #3b82f6;
color:#3b82f6;
padding:10px 20px;
border-radius:10px;
text-decoration:none;
}

/* HERO */
.hero{text-align:center;padding:80px 20px 40px;}

.hero h1{
font-size:48px;
font-weight:800;
background:linear-gradient(90deg,#3b82f6,#22d3ee);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
margin-top:20px;
font-size:18px;
color:#94a3b8;
max-width:650px;
margin:auto;
}

/* ANALYZER */
.container{
width:60%;
margin:80px auto;
padding:60px;
background:rgba(30,41,59,0.65);
backdrop-filter:blur(20px);
border-radius:24px;
}

.upload-box{
border:2px dashed rgba(59,130,246,0.5);
padding:50px;
border-radius:18px;
text-align:center;
margin-bottom:25px;
cursor:pointer;
}

textarea{
width:100%;
height:160px;
padding:16px;
border-radius:12px;
border:none;
background:#020617;
color:white;
margin-top:20px;
}

button{
width:100%;
margin-top:25px;
padding:16px;
border-radius:12px;
border:none;
font-weight:700;
background:linear-gradient(135deg,#3b82f6,#2563eb);
color:white;
cursor:pointer;
}

.results{
margin-top:40px;
padding:30px;
border-radius:18px;
background:#020617;
}

.results h2{color:#22c55e;}
</style>
</head>

<body>

<nav class="navbar">
  <div class="logo">ResumeIQ</div>
  <div class="nav-links">
    <a href="how-it-works.html">Home</a>
  </div>
  <a href="loginpage.html" class="login-btn">Login</a>
</nav>

<section class="hero">
  <h1>Check Your Resume Before Recruiters Do</h1>
  <p>
    Upload your resume, compare it with the job description,
    and get an ATS compatibility score.
  </p>
</section>

<div class="container">
  <h1>Resume ATS Scanner</h1>

  <!-- ✅ UPDATED FORM -->
  <form id="resumeForm">

    <div class="upload-box">
      📄 Upload Resume
      <input type="file" id="resumeFile" style="margin-top:15px">
    </div>

    <textarea id="jobDesc" placeholder="Paste Job Description Here..."></textarea>

    <button type="submit">Analyze Resume</button>
  </form>

  <!-- ✅ RESULTS BOX -->
  <div class="results" id="resultsBox">
    <h2>Match Score: 0%</h2>
    <h3>Matched Skills</h3>
    <p>NONE</p>
    <h3>Missing Skills</h3>
    <p>NONE</p>
    <h3>Suggestions</h3>
    <p>No suggestions yet</p>
  </div>
</div>

<!-- ✅ SCRIPT -->
<script>
document.getElementById('resumeForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  const fileInput = document.getElementById('resumeFile');
  const jobDesc = document.getElementById('jobDesc').value;

  if (!fileInput.files[0]) {
    alert("Please upload a resume");
    return;
  }

  const formData = new FormData();
  formData.append('resume', fileInput.files[0]);
  formData.append('jobDescription', jobDesc);

  try {
    const res = await fetch('http://localhost:5000/api/resume/analyze', {
      method: 'POST',
      body: formData
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.message || "Analysis failed");
      return;
    }

    document.getElementById('resultsBox').innerHTML = `
      <h2>Match Score: ${data.score}%</h2>

      <h3>Matched Skills</h3>
      <p>${data.matchedSkills.join(', ')}</p>

      <h3>Missing Skills</h3>
      <p>${data.missingSkills.join(', ')}</p>

      <h3>Suggestions</h3>
      <p>${data.suggestions}</p>
    `;

  } catch (err) {
    console.error(err);
    alert("Server error");
  }
});
</script>

</body>
</html>
