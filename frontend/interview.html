<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CareersFit — Interviews</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
:root{--bg:#0b1120;--sidebar:#0f172a;--card:#1e293b;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6;}
body{display:flex;height:100vh;background:var(--bg);color:var(--text);}
.sidebar{width:240px;background:var(--sidebar);color:white;padding:30px 20px;display:flex;flex-direction:column;flex-shrink:0;}
.logo{font-size:20px;font-weight:700;margin-bottom:40px;color:#60a5fa;}
.menu a{display:block;text-decoration:none;color:#e5e7eb;padding:11px 12px;border-radius:10px;margin-bottom:8px;transition:0.2s;font-size:14px;}
.menu a:hover{background:#3b82f6;color:white;}
.main{flex:1;padding:40px;overflow:auto;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;}
.topbar h2{color:#60a5fa;font-size:22px;}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:30px;}
.card{padding:25px;border-radius:16px;background:var(--card);box-shadow:0 4px 20px rgba(0,0,0,0.25);}
.card p{color:var(--muted);font-size:13px;}
.card h3{margin-top:8px;font-size:28px;color:var(--accent);}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.add-btn{background:#3b82f6;color:white;border:none;padding:9px 18px;border-radius:10px;font-weight:600;cursor:pointer;}
table{width:100%;border-collapse:collapse;background:var(--card);border-radius:16px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.25);}
th,td{padding:13px 14px;text-align:left;font-size:14px;}
th{background:#1e293b;color:#60a5fa;font-weight:500;}
td{border-bottom:1px solid rgba(255,255,255,0.06);}
.status{padding:5px 12px;border-radius:20px;font-size:12px;color:white;font-weight:600;}
.scheduled{background:#22c55e;} .pending{background:#f59e0b;} .completed{background:#3b82f6;} .cancelled{background:#ef4444;}
.empty{padding:30px;text-align:center;color:var(--muted);}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:50;}
.modal{background:var(--card);padding:28px;border-radius:16px;width:100%;max-width:480px;}
.modal h3{color:#60a5fa;margin-bottom:14px;}
.modal label{display:block;color:var(--muted);font-size:13px;margin:10px 0 6px;}
.modal input,.modal select{width:100%;padding:10px;background:#334155;color:white;border:none;border-radius:8px;}
.modal-actions{display:flex;gap:10px;margin-top:18px;justify-content:flex-end;}
.modal-actions button{padding:9px 18px;border:none;border-radius:10px;cursor:pointer;font-weight:600;}
.btn-cancel{background:#334155;color:white;}
.btn-confirm{background:#3b82f6;color:white;}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">CareersFit</div>
  <div class="menu">
    <a href="dashboard.html" class="nav-link">📊 Dashboard</a>
    <a href="applicant.html" class="nav-link">👥 Applicants</a>
    <a href="interview.html" class="nav-link">📅 Interviews</a>
    <a href="analytics.html" class="nav-link">📈 Analytics</a>
    <a href="post-job.html" class="nav-link">💼 Post a Job</a>
    <a href="setting.html" class="nav-link">⚙️ Settings</a>
  </div>
  <div style="margin-top:auto;padding-top:20px;">
    <a href="#" onclick="logout();return false;" style="display:block;text-decoration:none;color:#94a3b8;padding:12px;border-radius:10px;font-size:14px;">🚪 Logout</a>
  </div>
</div>

<div class="main">
  <div class="topbar"><h2>Interview Management</h2></div>
  <div class="cards">
    <div class="card"><p>Total Interviews</p><h3 id="cTotal">0</h3></div>
    <div class="card"><p>Scheduled</p><h3 id="cScheduled">0</h3></div>
    <div class="card"><p>Completed</p><h3 id="cCompleted">0</h3></div>
  </div>
  <div class="toolbar">
    <span></span>
    <button class="add-btn" onclick="openSchedule()">+ Schedule Interview</button>
  </div>
  <table>
    <thead>
      <tr><th>Candidate</th><th>Position</th><th>Date</th><th>Time</th><th>Interviewer</th><th>Status</th><th>Action</th></tr>
    </thead>
    <tbody id="rows"><tr><td colspan="7" class="empty">Loading…</td></tr></tbody>
  </table>
</div>

<!-- SCHEDULE MODAL -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h3>Schedule Interview</h3>
    <label>Application</label>
    <select id="appSelect"></select>
    <label>Date & Time</label>
    <input type="datetime-local" id="when">
    <label>Interviewer</label>
    <input type="text" id="interviewer" placeholder="e.g. Tech Lead">
    <label>Notes (optional)</label>
    <input type="text" id="notes" placeholder="">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" id="confirmBtn">Schedule</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
if(!requireAuth(['recruiter'])) { /* redirected */ }
highlightNav();

let interviews = [];

function fmtDate(d){
  if(!d) return '—';
  const dt = new Date(d);
  return dt.toLocaleDateString(undefined, {day:'2-digit', month:'short', year:'numeric'});
}
function fmtTime(d){
  if(!d) return '—';
  return new Date(d).toLocaleTimeString(undefined, {hour:'2-digit', minute:'2-digit'});
}

async function load(){
  try {
    const data = await api('/api/interviews');
    interviews = data.interviews || [];
    document.getElementById('cTotal').textContent = interviews.length;
    document.getElementById('cScheduled').textContent = interviews.filter(i => i.status === 'scheduled').length;
    document.getElementById('cCompleted').textContent = interviews.filter(i => i.status === 'completed').length;

    const tbody = document.getElementById('rows');
    if(!interviews.length){
      tbody.innerHTML = '<tr><td colspan="7" class="empty">No interviews scheduled yet.</td></tr>';
      return;
    }
    tbody.innerHTML = interviews.map(i => `
      <tr>
        <td>${i.candidate || '—'}</td>
        <td>${i.position || '—'}</td>
        <td>${fmtDate(i.scheduled_at)}</td>
        <td>${fmtTime(i.scheduled_at)}</td>
        <td>${i.interviewer || '—'}</td>
        <td><span class="status ${i.status}">${i.status}</span></td>
        <td>
          <select onchange="updateStatus(${i.id}, this.value)" style="background:#334155;color:white;border:none;padding:6px 10px;border-radius:8px;">
            <option ${i.status==='scheduled'?'selected':''}>scheduled</option>
            <option ${i.status==='completed'?'selected':''}>completed</option>
            <option ${i.status==='cancelled'?'selected':''}>cancelled</option>
          </select>
        </td>
      </tr>
    `).join('');
  } catch(err){
    document.getElementById('rows').innerHTML =
      `<tr><td colspan="7" class="empty" style="color:#ef4444">${err.message}</td></tr>`;
  }
}

async function openSchedule(){
  try {
    const apps = await api('/api/applications/recruiter');
    const sel = document.getElementById('appSelect');
    if(!apps.applicants.length){
      alert('No applicants yet. Wait for someone to apply, or post a job first.');
      return;
    }
    sel.innerHTML = apps.applicants.map(a =>
      `<option value="${a.id}">${a.name} — ${a.position}</option>`
    ).join('');
    document.getElementById('modal').style.display = 'flex';
  } catch(err){
    alert('Failed: ' + err.message);
  }
}
function closeModal(){ document.getElementById('modal').style.display = 'none'; }

document.getElementById('confirmBtn').addEventListener('click', async () => {
  const application_id = document.getElementById('appSelect').value;
  const scheduled_at = document.getElementById('when').value;
  if(!application_id || !scheduled_at){ alert('Pick an applicant and time'); return; }
  try {
    await api('/api/interviews', {
      method: 'POST',
      body: JSON.stringify({
        application_id: Number(application_id),
        scheduled_at,
        interviewer: document.getElementById('interviewer').value.trim(),
        notes: document.getElementById('notes').value.trim()
      })
    });
    closeModal();
    load();
  } catch(err){
    alert('Failed: ' + err.message);
  }
});

async function updateStatus(id, status){
  try {
    await api('/api/interviews/' + id, {
      method: 'PUT',
      body: JSON.stringify({ status })
    });
    load();
  } catch(err){
    alert('Failed: ' + err.message);
  }
}

load();
</script>
</body>
</html>
