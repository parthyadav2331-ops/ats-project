<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CareersFit — Browse Jobs</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
:root{--bg:#071a14;--sidebar:#0a1f18;--card:#0f2d24;--text:#e2e8f0;--muted:#94a3b8;--accent:#10b981;}
body{display:flex;height:100vh;background:var(--bg);color:var(--text);}
.sidebar{width:240px;background:var(--sidebar);color:white;padding:30px 20px;display:flex;flex-direction:column;flex-shrink:0;}
.logo{font-size:20px;font-weight:700;margin-bottom:40px;color:#34d399;letter-spacing:-0.3px;}
.menu a{display:block;text-decoration:none;color:#e5e7eb;padding:11px 12px;border-radius:10px;margin-bottom:8px;transition:0.2s;font-size:14px;}
.menu a:hover{background:#10b981;color:white;}
.main{flex:1;padding:40px;overflow:auto;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;}
.topbar h2{color:#34d399;font-size:22px;}
.filter-bar{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;}
.filter-bar input,.filter-bar select{padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:var(--card);color:var(--text);outline:none;font-size:14px;font-family:'Inter',sans-serif;}
.filter-bar input{flex:1;min-width:200px;}
.job-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;}
.job-card{background:var(--card);border-radius:16px;padding:24px;box-shadow:0 4px 20px rgba(0,0,0,0.3);transition:0.3s;border:1px solid transparent;}
.job-card:hover{border-color:#10b981;transform:translateY(-3px);}
.job-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.job-title{font-size:16px;font-weight:600;color:#34d399;}
.job-company{font-size:13px;color:var(--muted);margin-bottom:10px;}
.job-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.tag{background:rgba(16,185,129,0.15);color:#34d399;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500;}
.tag.type{background:rgba(59,130,246,0.15);color:#60a5fa;}
.apply-btn{padding:9px 20px;border:none;border-radius:10px;background:#10b981;color:white;font-weight:600;font-size:13px;cursor:pointer;transition:0.2s;}
.apply-btn:hover{background:#059669;}
.apply-btn.applied{background:#475569;cursor:not-allowed;}
.job-footer{display:flex;justify-content:space-between;align-items:center;margin-top:14px;}
.job-meta{font-size:12px;color:var(--muted);}
.empty{padding:40px;text-align:center;color:var(--muted);background:var(--card);border-radius:16px;grid-column:1/-1;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:50;}
.modal{background:var(--card);padding:28px;border-radius:16px;width:100%;max-width:480px;}
.modal h3{color:#34d399;margin-bottom:14px;font-size:16px;}
.modal input[type=file]{width:100%;padding:10px;background:#0a2a20;border:1px dashed #10b981;border-radius:10px;color:var(--text);}
.modal-actions{display:flex;gap:10px;margin-top:18px;justify-content:flex-end;}
.modal-actions button{padding:9px 18px;border:none;border-radius:10px;cursor:pointer;font-weight:600;}
.btn-cancel{background:#334155;color:white;}
.btn-confirm{background:#10b981;color:white;}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">CareersFit</div>
  <div class="menu">
    <a href="how-it-works.html" class="nav-link" data-active-bg="#10b981">🏠 Home</a>
    <a href="resumeanalyzer.html" class="nav-link" data-active-bg="#10b981">🔍 Resume Scanner</a>
    <a href="createresume.html" class="nav-link" data-active-bg="#10b981">📄 Create Resume</a>
    <a href="jobs.html" class="nav-link" data-active-bg="#10b981">💼 Browse Jobs</a>
    <a href="user-profile.html" class="nav-link" data-active-bg="#10b981">👤 My Profile</a>
  </div>
  <div style="margin-top:auto;padding-top:20px;">
    <a href="#" onclick="logout();return false;" style="display:block;text-decoration:none;color:#94a3b8;padding:12px;border-radius:10px;font-size:14px;">🚪 Logout</a>
  </div>
</div>

<div class="main">
  <div class="topbar"><h2>Browse Jobs</h2></div>
  <div class="filter-bar">
    <input type="text" id="searchJobs" placeholder="Search job title or company...">
    <select id="filterType">
      <option value="">All Types</option>
      <option>Full-time</option><option>Part-time</option><option>Contract</option><option>Internship</option>
    </select>
    <select id="filterExp">
      <option value="">All Experience</option>
      <option>Fresher</option><option>1-3 years</option><option>3-5 years</option><option>5+ years</option>
    </select>
  </div>
  <div class="job-grid" id="jobGrid">
    <div class="empty">Loading jobs…</div>
  </div>
</div>

<!-- APPLY MODAL -->
<div class="modal-bg" id="applyModal">
  <div class="modal">
    <h3 id="modalTitle">Apply</h3>
    <p style="color:#94a3b8;font-size:13px;margin-bottom:14px;">Upload your resume PDF. We'll calculate the ATS score for you.</p>
    <input type="file" id="modalFile" accept="application/pdf">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" id="modalSubmit">Apply Now</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
if(!requireAuth()) { /* redirected */ }
highlightNav();

let allJobs = [];
let appliedIds = new Set();
let activeJobId = null;

async function loadJobs(){
  const grid = document.getElementById('jobGrid');
  try {
    const [jobsRes, mineRes] = await Promise.all([
      api('/api/jobs'),
      getRole() === 'user' ? api('/api/applications/mine').catch(() => ({applications: []})) : { applications: [] }
    ]);
    allJobs = jobsRes.jobs || [];
    appliedIds = new Set((mineRes.applications || []).map(a => a.job_id));
    render();
  } catch(err){
    grid.innerHTML = `<div class="empty">Failed to load jobs: ${err.message}</div>`;
  }
}

function render(){
  const grid = document.getElementById('jobGrid');
  const q = document.getElementById('searchJobs').value.toLowerCase();
  const t = document.getElementById('filterType').value;
  const e = document.getElementById('filterExp').value;

  const filtered = allJobs.filter(j => {
    const text = `${j.title} ${j.company || ''} ${j.location || ''}`.toLowerCase();
    if(q && !text.includes(q)) return false;
    if(t && j.type !== t) return false;
    if(e && j.experience !== e) return false;
    return true;
  });

  if(!filtered.length){
    grid.innerHTML = '<div class="empty">No jobs match your filters yet.</div>';
    return;
  }

  grid.innerHTML = filtered.map(j => {
    const skills = (j.skills || []).slice(0,4).map(s => `<span class="tag">${s}</span>`).join('');
    const isApplied = appliedIds.has(j.id);
    return `
      <div class="job-card">
        <div class="job-header">
          <div>
            <div class="job-title">${j.title}</div>
            <div class="job-company">${j.company || j.recruiter_name || 'CareersFit'} · ${j.location || 'Remote'}</div>
          </div>
        </div>
        <div class="job-tags">
          ${skills}
          ${j.type ? `<span class="tag type">${j.type}</span>` : ''}
        </div>
        <div class="job-meta">${j.salary || '—'} &nbsp;·&nbsp; ${j.experience || 'Any experience'}</div>
        <div class="job-footer">
          <span class="job-meta">Posted ${new Date(j.created_at).toLocaleDateString()}</span>
          <button class="apply-btn ${isApplied ? 'applied' : ''}" ${isApplied ? 'disabled' : ''} onclick="openApply(${j.id}, '${j.title.replace(/'/g, "\\'")}')">
            ${isApplied ? 'Applied' : 'Apply Now'}
          </button>
        </div>
      </div>`;
  }).join('');
}

function openApply(jobId, title){
  if(getRole() !== 'user'){
    alert('Only job seekers can apply. Switch to a job seeker account.');
    return;
  }
  activeJobId = jobId;
  document.getElementById('modalTitle').textContent = `Apply: ${title}`;
  document.getElementById('modalFile').value = '';
  document.getElementById('applyModal').style.display = 'flex';
}
function closeModal(){
  document.getElementById('applyModal').style.display = 'none';
  activeJobId = null;
}

document.getElementById('modalSubmit').addEventListener('click', async () => {
  const file = document.getElementById('modalFile').files[0];
  if(!file){ alert('Please choose a resume PDF.'); return; }

  const fd = new FormData();
  fd.append('job_id', activeJobId);
  fd.append('resume', file);

  try {
    const data = await api('/api/applications', { method: 'POST', body: fd });
    appliedIds.add(activeJobId);
    closeModal();
    alert(`Applied! Your ATS score for this job: ${data.ats.score}%`);
    render();
  } catch(err){
    alert('Failed to apply: ' + err.message);
  }
});

document.getElementById('searchJobs').addEventListener('input', render);
document.getElementById('filterType').addEventListener('change', render);
document.getElementById('filterExp').addEventListener('change', render);

loadJobs();
</script>
</body>
</html>
