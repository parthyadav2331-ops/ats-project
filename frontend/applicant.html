<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CareersFit — Applicants</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
:root{--bg:#0b1120;--sidebar:#0f172a;--card:#1e293b;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6;}
body{display:flex;height:100vh;background:var(--bg);color:var(--text);}
.sidebar{width:240px;background:var(--sidebar);color:white;padding:30px 20px;display:flex;flex-direction:column;flex-shrink:0;}
.logo{font-size:20px;font-weight:700;margin-bottom:40px;color:#60a5fa;letter-spacing:-0.3px;}
.menu a{display:block;text-decoration:none;color:#e5e7eb;padding:11px 12px;border-radius:10px;margin-bottom:8px;transition:0.2s;font-size:14px;}
.menu a:hover{background:#3b82f6;color:white;}
.main{flex:1;padding:40px;overflow:auto;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;}
.topbar h2{color:#60a5fa;font-size:22px;}
.search{padding:10px 15px;border-radius:10px;border:none;background:var(--card);color:white;outline:none;font-size:14px;}
.table-box{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 4px 20px rgba(0,0,0,0.25);}
table{width:100%;border-collapse:collapse;}
th,td{padding:13px 14px;text-align:left;font-size:14px;}
th{color:var(--muted);font-weight:500;border-bottom:1px solid rgba(255,255,255,0.08);}
tr:not(:last-child) td{border-bottom:1px solid rgba(255,255,255,0.06);}
.status{padding:4px 11px;border-radius:20px;font-size:12px;font-weight:600;}
.applied{background:#dbeafe;color:#1d4ed8;}
.shortlisted{background:#fef9c3;color:#92400e;}
.interview{background:#dcfce7;color:#15803d;}
.rejected{background:#fee2e2;color:#b91c1c;}
.hired{background:#d1fae5;color:#065f46;}
select.status-select{background:#334155;color:white;border:none;padding:6px 10px;border-radius:8px;font-size:13px;cursor:pointer;}
.empty{padding:40px;text-align:center;color:var(--muted);}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">CareersFit</div>
  <div class="menu">
    <a href="dashboard.html" class="nav-link">📊 Dashboard</a>
    <a href="applicant.html" class="nav-link">👥 Applicants</a>
    <a href="interview.html" class="nav-link">📅 Interviews</a>
    <a href="analytics.html" class="nav-link">📈 Analytics</a>
    <a href="post-job.html" class="nav-link">💼 Post a Job</a>
    <a href="setting.html" class="nav-link">⚙️ Settings</a>
  </div>
  <div style="margin-top:auto;padding-top:20px;">
    <a href="#" onclick="logout();return false;" style="display:block;text-decoration:none;color:#94a3b8;padding:12px;border-radius:10px;font-size:14px;">🚪 Logout</a>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <h2>Applicants</h2>
    <input class="search" id="search" placeholder="Search candidates...">
  </div>
  <div class="table-box">
    <table id="applicantTable">
      <thead>
        <tr>
          <th>Name</th><th>Email</th><th>Position</th><th>ATS Score</th><th>Status</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="rows">
        <tr><td colspan="6" class="empty">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script src="js/api.js"></script>
<script>
if(!requireAuth(['recruiter'])) { /* redirected */ }
highlightNav();

let all = [];

function scoreColor(s){
  if(s == null) return '#94a3b8';
  if(s >= 80) return '#22c55e';
  if(s >= 60) return '#3b82f6';
  return '#ef4444';
}

function statusClass(s){
  return ['applied','shortlisted','interview','rejected','hired'].includes(s) ? s : 'applied';
}

function render(filter){
  const tbody = document.getElementById('rows');
  const q = (filter || '').toLowerCase();
  const rows = all.filter(a => !q || `${a.name} ${a.email} ${a.position}`.toLowerCase().includes(q));
  if(!rows.length){
    tbody.innerHTML = '<tr><td colspan="6" class="empty">No applicants yet.</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(a => `
    <tr>
      <td>${a.name}</td>
      <td>${a.email}</td>
      <td>${a.position}</td>
      <td style="color:${scoreColor(a.ats_score)};font-weight:600;">${a.ats_score != null ? a.ats_score + '%' : '—'}</td>
      <td><span class="status ${statusClass(a.status)}">${a.status}</span></td>
      <td>
        <select class="status-select" onchange="updateStatus(${a.id}, this.value)">
          <option ${a.status==='applied'?'selected':''}>applied</option>
          <option ${a.status==='shortlisted'?'selected':''}>shortlisted</option>
          <option ${a.status==='interview'?'selected':''}>interview</option>
          <option ${a.status==='rejected'?'selected':''}>rejected</option>
          <option ${a.status==='hired'?'selected':''}>hired</option>
        </select>
      </td>
    </tr>
  `).join('');
}

async function load(){
  try {
    const data = await api('/api/applications/recruiter');
    all = data.applicants;
    render('');
  } catch(err){
    document.getElementById('rows').innerHTML =
      `<tr><td colspan="6" class="empty" style="color:#ef4444">${err.message}</td></tr>`;
  }
}

async function updateStatus(id, status){
  try {
    await api('/api/applications/' + id + '/status', {
      method: 'PUT',
      body: JSON.stringify({ status })
    });
    const row = all.find(a => a.id === id);
    if(row) row.status = status;
    render(document.getElementById('search').value);
  } catch(err){
    alert('Failed: ' + err.message);
  }
}

document.getElementById('search').addEventListener('input', (e) => render(e.target.value));
load();
</script>
</body>
</html>
