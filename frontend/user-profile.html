<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CareersFit — My Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
:root{--bg:#071a14;--sidebar:#0a1f18;--card:#0f2d24;--text:#e2e8f0;--muted:#94a3b8;--accent:#10b981;}
body{display:flex;height:100vh;background:var(--bg);color:var(--text);}
.sidebar{width:240px;background:var(--sidebar);color:white;padding:30px 20px;display:flex;flex-direction:column;flex-shrink:0;}
.logo{font-size:20px;font-weight:700;margin-bottom:40px;color:#34d399;}
.menu a{display:block;text-decoration:none;color:#e5e7eb;padding:11px 12px;border-radius:10px;margin-bottom:8px;transition:0.2s;font-size:14px;}
.menu a:hover{background:#10b981;color:white;}
.main{flex:1;padding:40px;overflow:auto;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;}
.topbar h2{color:#34d399;font-size:22px;}
.profile-grid{display:grid;grid-template-columns:280px 1fr;gap:24px;}
.profile-card{background:var(--card);border-radius:18px;padding:28px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.3);align-self:start;}
.avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#10b981,#059669);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px;}
.profile-name{font-size:18px;font-weight:700;margin-bottom:4px;}
.profile-role{font-size:13px;color:#10b981;margin-bottom:14px;}
.profile-stat{display:flex;justify-content:space-around;margin-top:18px;border-top:1px solid rgba(255,255,255,0.08);padding-top:18px;}
.stat-item{text-align:center;}
.stat-num{font-size:20px;font-weight:700;color:#34d399;}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px;}
.details-section{display:flex;flex-direction:column;gap:20px;}
.section{background:var(--card);border-radius:16px;padding:24px;box-shadow:0 4px 20px rgba(0,0,0,0.3);}
.section h3{color:#34d399;margin-bottom:18px;font-size:15px;font-weight:600;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.form-group{display:flex;flex-direction:column;}
label{margin-bottom:5px;color:var(--muted);font-size:12px;font-weight:500;}
input,select,textarea{padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:#0a2a20;color:var(--text);outline:none;font-size:13px;}
input:focus,select:focus{border-color:#10b981;}
.skill-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.skill-tag{background:rgba(16,185,129,0.15);color:#34d399;padding:5px 13px;border-radius:20px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;}
.skill-tag span{cursor:pointer;color:#94a3b8;}
.save-btn{padding:11px 24px;border:none;border-radius:10px;background:#10b981;color:white;font-weight:600;font-size:14px;cursor:pointer;transition:0.2s;}
.save-btn:hover{background:#059669;}
.msg{margin-left:14px;font-size:13px;}
.msg.ok{color:#22c55e;} .msg.err{color:#ef4444;}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">CareersFit</div>
  <div class="menu">
    <a href="how-it-works.html" class="nav-link" data-active-bg="#10b981">🏠 Home</a>
    <a href="resumeanalyzer.html" class="nav-link" data-active-bg="#10b981">🔍 Resume Scanner</a>
    <a href="createresume.html" class="nav-link" data-active-bg="#10b981">📄 Create Resume</a>
    <a href="jobs.html" class="nav-link" data-active-bg="#10b981">💼 Browse Jobs</a>
    <a href="user-profile.html" class="nav-link" data-active-bg="#10b981">👤 My Profile</a>
  </div>
  <div style="margin-top:auto;padding-top:20px;">
    <a href="#" onclick="logout();return false;" style="display:block;text-decoration:none;color:#94a3b8;padding:12px;border-radius:10px;font-size:14px;">🚪 Logout</a>
  </div>
</div>

<div class="main">
  <div class="topbar"><h2>My Profile</h2></div>
  <div class="profile-grid">
    <div class="profile-card">
      <div class="avatar">👤</div>
      <div class="profile-name" id="hName">—</div>
      <div class="profile-role" id="hRole">—</div>
      <div style="font-size:12px;color:var(--muted);" id="hLoc">—</div>
      <div class="profile-stat">
        <div class="stat-item"><div class="stat-num" id="sBest">0%</div><div class="stat-label">Best ATS</div></div>
        <div class="stat-item"><div class="stat-num" id="sApplied">0</div><div class="stat-label">Applied</div></div>
        <div class="stat-item"><div class="stat-num" id="sShort">0</div><div class="stat-label">Shortlisted</div></div>
      </div>
    </div>

    <div class="details-section">
      <div class="section">
        <h3>Personal Information</h3>
        <div class="form-row">
          <div class="form-group"><label>Full Name</label><input type="text" id="name"></div>
          <div class="form-group"><label>Email</label><input type="email" id="email" disabled></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Phone</label><input type="tel" id="phone" placeholder="+91 00000 00000"></div>
          <div class="form-group"><label>Location</label><input type="text" id="location"></div>
        </div>
        <div class="form-group"><label>LinkedIn</label><input type="text" id="linkedin" placeholder="linkedin.com/in/username"></div>
      </div>

      <div class="section">
        <h3>Career Details</h3>
        <div class="form-row">
          <div class="form-group"><label>Current Role</label><input type="text" id="current_role" placeholder="e.g. Frontend Developer"></div>
          <div class="form-group"><label>Experience</label>
            <select id="experience">
              <option value="">Select…</option>
              <option>Fresher</option><option>1-2 years</option><option>2-4 years</option><option>4+ years</option>
            </select>
          </div>
        </div>
        <div class="form-group" style="margin-top:4px;"><label>Expected Salary</label><input type="text" id="expected_salary" placeholder="e.g. ₹8–12 LPA"></div>
      </div>

      <div class="section">
        <h3>Skills</h3>
        <input type="text" id="skillInput" placeholder="Add a skill and press Enter">
        <div class="skill-tags" id="skillTags"></div>
      </div>

      <div style="display:flex;align-items:center;">
        <button class="save-btn" onclick="saveProfile()">Save Profile</button>
        <div class="msg" id="msg"></div>
      </div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
if(!requireAuth(['user'])) { /* redirected */ }
highlightNav();

let skills = [];

function renderSkills(){
  document.getElementById('skillTags').innerHTML = skills.map((s, i) =>
    `<span class="skill-tag">${s} <span onclick="removeSkill(${i})">×</span></span>`
  ).join('');
}
function removeSkill(i){ skills.splice(i,1); renderSkills(); }

document.getElementById('skillInput').addEventListener('keydown', (e) => {
  if(e.key === 'Enter'){
    e.preventDefault();
    const v = e.target.value.trim();
    if(v && !skills.includes(v)){ skills.push(v); renderSkills(); }
    e.target.value = '';
  }
});

async function load(){
  try {
    const data = await api('/api/profile');
    const u = data.user || {};
    const p = data.profile || {};
    const s = data.stats || {};

    document.getElementById('hName').textContent = u.name || '—';
    document.getElementById('hRole').textContent = p.current_role || 'Job Seeker';
    document.getElementById('hLoc').textContent = p.location || '—';

    document.getElementById('sBest').textContent = (s.best_score || 0) + '%';
    document.getElementById('sApplied').textContent = s.applied || 0;
    document.getElementById('sShort').textContent = s.shortlisted || 0;

    document.getElementById('name').value = u.name || '';
    document.getElementById('email').value = u.email || '';
    document.getElementById('phone').value = p.phone || '';
    document.getElementById('location').value = p.location || '';
    document.getElementById('linkedin').value = p.linkedin || '';
    document.getElementById('current_role').value = p.current_role || '';
    document.getElementById('experience').value = p.experience || '';
    document.getElementById('expected_salary').value = p.expected_salary || '';
    skills = p.skills || [];
    renderSkills();
  } catch(err){
    document.getElementById('msg').textContent = err.message;
    document.getElementById('msg').className = 'msg err';
  }
}

async function saveProfile(){
  const msg = document.getElementById('msg');
  msg.textContent = 'Saving…'; msg.className = 'msg';
  try {
    await api('/api/profile', {
      method: 'PUT',
      body: JSON.stringify({
        name: document.getElementById('name').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        location: document.getElementById('location').value.trim(),
        linkedin: document.getElementById('linkedin').value.trim(),
        current_role: document.getElementById('current_role').value.trim(),
        experience: document.getElementById('experience').value,
        expected_salary: document.getElementById('expected_salary').value.trim(),
        skills
      })
    });
    msg.textContent = 'Saved ✅'; msg.className = 'msg ok';
    load();
  } catch(err){
    msg.textContent = err.message; msg.className = 'msg err';
  }
}

load();
</script>
</body>
</html>
