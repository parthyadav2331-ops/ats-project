<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CareersFit — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
:root{--bg:#0b1120;--sidebar:#0f172a;--card:#1e293b;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6;}
body{display:flex;height:100vh;background:var(--bg);color:var(--text);}
.sidebar{width:240px;background:var(--sidebar);color:white;padding:30px 20px;display:flex;flex-direction:column;flex-shrink:0;}
.logo{font-size:20px;font-weight:700;margin-bottom:40px;color:#60a5fa;}
.menu a{display:block;text-decoration:none;color:#e5e7eb;padding:11px 12px;border-radius:10px;margin-bottom:8px;transition:0.2s;font-size:14px;}
.menu a:hover{background:#3b82f6;color:white;}
.main{flex:1;padding:40px;overflow:auto;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;}
.topbar h2{color:#60a5fa;font-size:22px;}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:30px;}
.card{padding:25px;border-radius:16px;background:var(--card);box-shadow:0 4px 20px rgba(0,0,0,0.25);transition:0.3s;}
.card:hover{transform:translateY(-4px);}
.card p{color:var(--muted);font-size:13px;}
.card h3{margin-top:8px;font-size:28px;color:var(--accent);}
.upload{background:linear-gradient(135deg,#1d4ed8,#3b82f6);color:white;padding:35px;border-radius:18px;text-align:center;margin-bottom:25px;}
.upload p{opacity:0.85;margin-top:8px;font-size:14px;}
.upload button{margin-top:18px;padding:11px 26px;border:none;border-radius:30px;background:white;color:#2563eb;font-weight:600;cursor:pointer;}
.score-box{padding:28px;border-radius:18px;background:var(--card);box-shadow:0 4px 20px rgba(0,0,0,0.25);}
.score-value{font-size:52px;font-weight:700;color:#3b82f6;margin:8px 0;}
.score-box p{color:var(--muted);font-size:14px;}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">CareersFit</div>
  <div class="menu" id="menu"></div>
  <div style="margin-top:auto;padding-top:20px;">
    <a href="#" onclick="logout();return false;" style="display:block;text-decoration:none;color:#94a3b8;padding:12px;border-radius:10px;font-size:14px;">🚪 Logout</a>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <h2 id="welcome">Dashboard</h2>
  </div>
  <div class="cards" id="cards"></div>

  <div class="upload">
    <h2 id="ctaTitle">Quick Resume Check</h2>
    <p id="ctaText">Upload a resume to check ATS compatibility</p>
    <button onclick="window.location.href='resumeanalyzer.html'">Open Resume Analyzer</button>
  </div>

  <div class="score-box">
    <h3 id="scoreTitle" style="color:#60a5fa;margin-bottom:4px;">Last ATS Score</h3>
    <div class="score-value" id="scoreValue">—</div>
    <p id="scoreSub">Upload a resume to see your score.</p>
  </div>
</div>

<script src="js/api.js"></script>
<script>
if(!requireAuth()) { /* redirected */ }

const role = getRole();
const recruiterMenu = `
  <a href="dashboard.html" class="nav-link">📊 Dashboard</a>
  <a href="applicant.html" class="nav-link">👥 Applicants</a>
  <a href="interview.html" class="nav-link">📅 Interviews</a>
  <a href="analytics.html" class="nav-link">📈 Analytics</a>
  <a href="post-job.html" class="nav-link">💼 Post a Job</a>
  <a href="setting.html" class="nav-link">⚙️ Settings</a>
`;
const userMenu = `
  <a href="how-it-works.html" class="nav-link">🏠 Home</a>
  <a href="resumeanalyzer.html" class="nav-link">🔍 Resume Scanner</a>
  <a href="createresume.html" class="nav-link">📄 Create Resume</a>
  <a href="jobs.html" class="nav-link">💼 Browse Jobs</a>
  <a href="user-profile.html" class="nav-link">👤 My Profile</a>
`;
document.getElementById('menu').innerHTML = role === 'recruiter' ? recruiterMenu : userMenu;
highlightNav();

async function loadRecruiter(){
  document.getElementById('welcome').textContent = 'Recruiter Dashboard';
  document.getElementById('ctaTitle').textContent = 'Post a Job';
  document.getElementById('ctaText').textContent = 'Find candidates that match your role.';
  document.querySelector('.upload button').textContent = 'Open Post a Job';
  document.querySelector('.upload button').onclick = () => window.location.href = 'post-job.html';

  const data = await api('/api/analytics/recruiter');
  const c = data.cards || {};
  document.getElementById('cards').innerHTML = `
    <div class="card"><p>Total Applicants</p><h3>${c.total_applicants || 0}</h3></div>
    <div class="card"><p>Interviews</p><h3>${c.interviews || 0}</h3></div>
    <div class="card"><p>Hired</p><h3>${c.hired || 0}</h3></div>
  `;
  document.getElementById('scoreTitle').textContent = 'Hires this period';
  document.getElementById('scoreValue').textContent = c.hired || 0;
  document.getElementById('scoreSub').textContent = `${c.shortlisted || 0} candidates shortlisted.`;
}

async function loadUser(){
  document.getElementById('welcome').textContent = 'My Dashboard';
  const data = await api('/api/analytics/me');
  document.getElementById('cards').innerHTML = `
    <div class="card"><p>Resumes Uploaded</p><h3>${data.total_resumes || 0}</h3></div>
    <div class="card"><p>Average ATS Score</p><h3>${Math.round(data.avg_score || 0)}%</h3></div>
    <div class="card"><p>Applications Sent</p><h3>${data.applications || 0}</h3></div>
  `;
  if(data.latest_score != null){
    document.getElementById('scoreValue').textContent = data.latest_score + '%';
    document.getElementById('scoreSub').textContent = data.latest_score >= 70
      ? 'Strong match — keep tailoring per job.'
      : 'Try matching more keywords from the job description.';
  }
}

(async () => {
  try {
    if(role === 'recruiter') await loadRecruiter(); else await loadUser();
  } catch(err){
    document.getElementById('cards').innerHTML =
      `<div class="card" style="grid-column:1/-1;color:#ef4444;">${err.message}</div>`;
  }
})();
</script>
</body>
</html>
