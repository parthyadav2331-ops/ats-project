<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CareersFit — My Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
:root{--bg:#071a14;--sidebar:#0a1f18;--card:#0f2d24;--text:#e2e8f0;--muted:#94a3b8;--accent:#10b981;}
body{display:flex;height:100vh;background:var(--bg);color:var(--text);}
.sidebar{width:240px;background:var(--sidebar);color:white;padding:30px 20px;display:flex;flex-direction:column;flex-shrink:0;}
.logo{font-size:20px;font-weight:700;margin-bottom:40px;color:#34d399;letter-spacing:-0.3px;}
.menu a{display:block;text-decoration:none;color:#e5e7eb;padding:11px 12px;border-radius:10px;margin-bottom:8px;transition:0.2s;font-size:14px;}
.menu a:hover{background:#10b981;color:white;}
.main{flex:1;padding:40px;overflow:auto;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;}
.topbar h2{color:#34d399;font-size:22px;}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:30px;}
.card{padding:25px;border-radius:16px;background:var(--card);color:var(--text);box-shadow:0 4px 20px rgba(0,0,0,0.3);transition:0.3s;}
.card:hover{transform:translateY(-4px);}
.card p{color:var(--muted);font-size:13px;}
.card h3{margin-top:8px;font-size:28px;color:var(--accent);}
.profile-grid{display:grid;grid-template-columns:280px 1fr;gap:24px;}
.profile-card{background:var(--card);border-radius:18px;padding:28px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.3);align-self:start;}
.avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#10b981,#059669);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px;}
.profile-name{font-size:18px;font-weight:700;margin-bottom:4px;}
.profile-role{font-size:13px;color:#10b981;margin-bottom:14px;}
.profile-stat{display:flex;justify-content:space-around;margin-top:18px;border-top:1px solid rgba(255,255,255,0.08);padding-top:18px;}
.stat-item{text-align:center;}
.stat-num{font-size:20px;font-weight:700;color:#34d399;}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px;}
.edit-btn{margin-top:18px;width:100%;padding:10px;border:1px solid #10b981;border-radius:10px;background:transparent;color:#10b981;font-weight:600;font-size:13px;cursor:pointer;transition:0.2s;}
.edit-btn:hover{background:#10b981;color:white;}
.details-section{display:flex;flex-direction:column;gap:20px;}
.section{background:var(--card);border-radius:16px;padding:24px;box-shadow:0 4px 20px rgba(0,0,0,0.3);}
.section h3{color:#34d399;margin-bottom:18px;font-size:15px;font-weight:600;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.form-group{display:flex;flex-direction:column;}
label{margin-bottom:5px;color:var(--muted);font-size:12px;font-weight:500;}
input,select,textarea{padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:#0a2a20;color:var(--text);outline:none;font-size:13px;font-family:'Inter',sans-serif;}
input:focus,select:focus{border-color:#10b981;}
.skill-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.skill-tag{background:rgba(16,185,129,0.15);color:#34d399;padding:5px 13px;border-radius:20px;font-size:12px;font-weight:600;}
.save-btn{padding:11px 24px;border:none;border-radius:10px;background:#10b981;color:white;font-weight:600;font-size:14px;cursor:pointer;transition:0.2s;}
.save-btn:hover{background:#059669;}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">CareersFit</div>
  <div class="menu">
    <a href="how-it-works.html" class="nav-link">🏠 Home</a>
    <a href="resumeanalyzer.html" class="nav-link">🔍 Resume Scanner</a>
    <a href="createresume.html" class="nav-link">📄 Create Resume</a>
    <a href="jobs.html" class="nav-link">💼 Browse Jobs</a>
    <a href="user-profile.html" class="nav-link">👤 My Profile</a>
  </div>
  <div style="margin-top:auto;padding-top:20px;">
    <a href="loginpage.html" style="display:block;text-decoration:none;color:#94a3b8;padding:12px;border-radius:10px;font-size:14px;" onmouseover="this.style.background='#ef4444';this.style.color='white'" onmouseout="this.style.background='';this.style.color='#94a3b8'">🚪 Logout</a>
  </div>
</div>
<script>
(function(){
  var links = document.querySelectorAll('.nav-link');
  var page = window.location.pathname.split('/').pop() || 'how-it-works.html';
  links.forEach(function(a){
    if(a.getAttribute('href') === page){
      a.style.background='#10b981';
      a.style.color='white';
    }
  });
})();
</script>
<div class="main">
  <div class="topbar"><h2>My Profile</h2></div>
  <div class="profile-grid">
    <!-- LEFT: profile card -->
    <div class="profile-card">
      <div class="avatar">👤</div>
      <div class="profile-name">Your Name</div>
      <div class="profile-role">Frontend Developer</div>
      <div style="font-size:12px;color:var(--muted);">Mumbai, India</div>
      <div class="profile-stat">
        <div class="stat-item"><div class="stat-num">87%</div><div class="stat-label">ATS Score</div></div>
        <div class="stat-item"><div class="stat-num">5</div><div class="stat-label">Applied</div></div>
        <div class="stat-item"><div class="stat-num">2</div><div class="stat-label">Shortlisted</div></div>
      </div>
      <button class="edit-btn">Edit Photo</button>
    </div>
    <!-- RIGHT: details -->
    <div class="details-section">
      <div class="section">
        <h3>Personal Information</h3>
        <div class="form-row">
          <div class="form-group"><label>Full Name</label><input type="text" value="Your Name"></div>
          <div class="form-group"><label>Email</label><input type="email" value="you@email.com"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Phone</label><input type="tel" placeholder="+91 00000 00000"></div>
          <div class="form-group"><label>Location</label><input type="text" value="Mumbai, India"></div>
        </div>
        <div class="form-group"><label>LinkedIn</label><input type="text" placeholder="linkedin.com/in/username"></div>
      </div>
      <div class="section">
        <h3>Career Details</h3>
        <div class="form-row">
          <div class="form-group"><label>Current Role</label><input type="text" placeholder="e.g. Frontend Developer"></div>
          <div class="form-group"><label>Experience</label>
            <select><option>Fresher</option><option>1-2 years</option><option>2-4 years</option><option>4+ years</option></select>
          </div>
        </div>
        <div class="form-group" style="margin-top:4px;"><label>Expected Salary</label><input type="text" placeholder="e.g. ₹8–12 LPA"></div>
      </div>
      <div class="section">
        <h3>Skills</h3>
        <input type="text" placeholder="Add a skill and press Enter">
        <div class="skill-tags">
          <span class="skill-tag">HTML</span><span class="skill-tag">CSS</span>
          <span class="skill-tag">JavaScript</span><span class="skill-tag">React</span>
          <span class="skill-tag">Git</span>
        </div>
      </div>
      <button class="save-btn" onclick="alert('Profile saved!')">Save Profile</button>
    </div>
  </div>
</div>
</body>
</html>
