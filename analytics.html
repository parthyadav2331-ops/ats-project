<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>ATS Dashboard - Analytics</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

/* BLUE ATS THEME */

:root{
--bg:#0b1120;
--sidebar:#0f172a;
--card:#1e293b;
--text:#e2e8f0;
--muted:#94a3b8;
--accent:#3b82f6;
}

body{
display:flex;
height:100vh;
background:var(--bg);
color:var(--text);
}

/* SIDEBAR */

.sidebar{
width:240px;
background:var(--sidebar);
color:white;
padding:30px 20px;
display:flex;
flex-direction:column;
}

.logo{
font-size:22px;
font-weight:600;
margin-bottom:40px;
color:#60a5fa;
}

.menu a{
display:block;
text-decoration:none;
color:#e5e7eb;
padding:12px;
border-radius:10px;
margin-bottom:10px;
transition:0.2s;
}

.menu a:hover{
background:#3b82f6;
}

/* MAIN */

.main{
flex:1;
padding:40px;
overflow:auto;
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.topbar h2{
color:#60a5fa;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
padding:25px;
border-radius:16px;
background:var(--card);
color:var(--text);
box-shadow:0 10px 25px rgba(0,0,0,0.25);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card p{
color:var(--muted);
}

.card h3{
margin-top:8px;
font-size:28px;
color:var(--accent);
}

/* CHARTS */

.charts{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

.chart-box{
background:var(--card);
padding:25px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.chart-box h3{
margin-bottom:15px;
color:#60a5fa;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">ATS</div>

<div class="menu">
<a href="dashboard.html">Dashboard</a>
<a href="applicants.html">Applicants</a>
<a href="mainpage.html">Resume Analyzer</a>
<a href="interviews.html">Interviews</a>
<a href="analytics.html">Analytics</a>
<a href="setting.html">Settings</a>
</div>

</div>

<!-- MAIN CONTENT -->

<div class="main">

<div class="topbar">
<h2>Analytics</h2>
</div>

<!-- STATS CARDS -->

<div class="cards">

<div class="card">
<p>Total Applicants</p>
<h3>132</h3>
</div>

<div class="card">
<p>Shortlisted</p>
<h3>48</h3>
</div>

<div class="card">
<p>Interviews</p>
<h3>24</h3>
</div>

<div class="card">
<p>Hired</p>
<h3>6</h3>
</div>

</div>

<!-- CHARTS -->

<div class="charts">

<div class="chart-box">
<h3>Applications Per Job</h3>
<canvas id="jobChart"></canvas>
</div>

<div class="chart-box">
<h3>Hiring Pipeline</h3>
<canvas id="pipelineChart"></canvas>
</div>

<div class="chart-box">
<h3>Monthly Applications</h3>
<canvas id="monthlyChart"></canvas>
</div>

<div class="chart-box">
<h3>Interview Success Rate</h3>
<canvas id="successChart"></canvas>
</div>

</div>

</div>

<script>

/* CHART 1 */

new Chart(document.getElementById("jobChart"),{
type:'bar',
data:{
labels:['Frontend','Backend','UI/UX','Data','DevOps'],
datasets:[{
label:'Applications',
data:[35,28,20,25,12],
backgroundColor:'#3b82f6'
}]
}
});

/* CHART 2 */

new Chart(document.getElementById("pipelineChart"),{
type:'doughnut',
data:{
labels:['Applied','Shortlisted','Interviewed','Hired'],
datasets:[{
data:[132,48,24,6],
backgroundColor:['#60a5fa','#3b82f6','#2563eb','#22c55e']
}]
}
});

/* CHART 3 */

new Chart(document.getElementById("monthlyChart"),{
type:'line',
data:{
labels:['Jan','Feb','Mar','Apr','May','Jun'],
datasets:[{
label:'Applications',
data:[40,55,70,65,90,110],
borderColor:'#3b82f6',
tension:0.4,
fill:false
}]
}
});

/* CHART 4 */

new Chart(document.getElementById("successChart"),{
type:'pie',
data:{
labels:['Selected','Rejected'],
datasets:[{
data:[6,18],
backgroundColor:['#22c55e','#ef4444']
}]
}
});

</script>

</body>
</html>
