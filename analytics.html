<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CareersFit — Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
:root{--bg:#0b1120;--sidebar:#0f172a;--card:#1e293b;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6;}
body{display:flex;height:100vh;background:var(--bg);color:var(--text);}
.sidebar{width:240px;background:var(--sidebar);color:white;padding:30px 20px;display:flex;flex-direction:column;flex-shrink:0;}
.logo{font-size:20px;font-weight:700;margin-bottom:40px;color:#60a5fa;letter-spacing:-0.3px;}
.menu a{display:block;text-decoration:none;color:#e5e7eb;padding:11px 12px;border-radius:10px;margin-bottom:8px;transition:0.2s;font-size:14px;}
.menu a:hover{background:#3b82f6;color:white;}
.main{flex:1;padding:40px;overflow:auto;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;}
.topbar h2{color:#60a5fa;font-size:22px;}
.search{padding:10px 15px;border-radius:10px;border:none;background:var(--card);color:white;outline:none;font-size:14px;}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:30px;}
.card{padding:25px;border-radius:16px;background:var(--card);color:var(--text);box-shadow:0 4px 20px rgba(0,0,0,0.25);transition:0.3s;}
.card:hover{transform:translateY(-4px);}
.card p{color:var(--muted);font-size:13px;}
.card h3{margin-top:8px;font-size:28px;color:var(--accent);}
.cards{grid-template-columns:repeat(4,1fr);}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:25px;}
.chart-box{background:var(--card);padding:25px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.25);}
.chart-box h3{margin-bottom:15px;color:#60a5fa;font-size:15px;}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">CareersFit</div>
  <div class="menu">
    <a href="dashboard.html" class="nav-link">📊 Dashboard</a>
    <a href="applicant.html" class="nav-link">👥 Applicants</a>
    <a href="interview.html" class="nav-link">📅 Interviews</a>
    <a href="analytics.html" class="nav-link">📈 Analytics</a>
    <a href="post-job.html" class="nav-link">💼 Post a Job</a>
    <a href="setting.html" class="nav-link">⚙️ Settings</a>
  </div>
  <div style="margin-top:auto;padding-top:20px;">
    <a href="loginpage.html" style="display:block;text-decoration:none;color:#94a3b8;padding:12px;border-radius:10px;font-size:14px;" onmouseover="this.style.background='#ef4444';this.style.color='white'" onmouseout="this.style.background='';this.style.color='#94a3b8'">🚪 Logout</a>
  </div>
</div>
<script>
(function(){
  var links = document.querySelectorAll('.nav-link');
  var page = window.location.pathname.split('/').pop() || 'dashboard.html';
  links.forEach(function(a){
    if(a.getAttribute('href') === page){
      a.style.background='#3b82f6';
      a.style.color='white';
    }
  });
})();
</script>
<div class="main">
  <div class="topbar"><h2>Analytics</h2></div>
  <div class="cards">
    <div class="card"><p>Total Applicants</p><h3>132</h3></div>
    <div class="card"><p>Shortlisted</p><h3>48</h3></div>
    <div class="card"><p>Interviews</p><h3>24</h3></div>
    <div class="card"><p>Hired</p><h3>6</h3></div>
  </div>
  <div class="charts">
    <div class="chart-box"><h3>Applications Per Job</h3><canvas id="jobChart"></canvas></div>
    <div class="chart-box"><h3>Hiring Pipeline</h3><canvas id="pipelineChart"></canvas></div>
    <div class="chart-box"><h3>Monthly Applications</h3><canvas id="monthlyChart"></canvas></div>
    <div class="chart-box"><h3>Interview Success Rate</h3><canvas id="successChart"></canvas></div>
  </div>
</div>
<script>
var chartDefaults = { color:'#94a3b8', borderColor:'rgba(255,255,255,0.1)' };
Chart.defaults.color = '#94a3b8';
new Chart(document.getElementById('jobChart'),{type:'bar',data:{labels:['Frontend','Backend','UI/UX','Data','DevOps'],datasets:[{label:'Applications',data:[35,28,20,25,12],backgroundColor:'#3b82f6',borderRadius:6}]}});
new Chart(document.getElementById('pipelineChart'),{type:'doughnut',data:{labels:['Applied','Shortlisted','Interviewed','Hired'],datasets:[{data:[132,48,24,6],backgroundColor:['#60a5fa','#3b82f6','#2563eb','#22c55e'],borderWidth:0}]}});
new Chart(document.getElementById('monthlyChart'),{type:'line',data:{labels:['Jan','Feb','Mar','Apr','May','Jun'],datasets:[{label:'Applications',data:[40,55,70,65,90,110],borderColor:'#3b82f6',tension:0.4,fill:false,pointBackgroundColor:'#3b82f6'}]}});
new Chart(document.getElementById('successChart'),{type:'pie',data:{labels:['Selected','Rejected'],datasets:[{data:[6,18],backgroundColor:['#22c55e','#ef4444'],borderWidth:0}]}});
</script>
</body>
</html>
